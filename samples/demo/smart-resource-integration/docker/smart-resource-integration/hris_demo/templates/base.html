<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Human Resources Information System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand" href="#">Demo HRIS</a>
    {% if request.path == "/hris" %}
    <div class="navbar-nav">
        <a class="nav-link btn btn-outline-success" href="{{ url_for('add') }}">Add Employee</a>
        <a class="nav-link btn btn-outline-primary" href="{{ url_for('export_csv') }}" >Export CSV</a>
    </div>
    {% endif %}
</nav>

<div class="container mt-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Hide flash messages after 5 seconds
        setTimeout(function() {
            var alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                // Fade out effect (optional)
                alert.style.transition = 'opacity 0.5s';
                alert.style.opacity = '0';
                // Remove from DOM after fade
                setTimeout(function() {
                    alert.remove();
                }, 2000); // Match this with the transition duration
            });
        }, 5000); // 5000ms = 5 seconds
    });
</script>
</body>
</html>
